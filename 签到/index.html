<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生签到端 Student Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="page1" class="page active">
        <h2>学生签到 <span class="en">Student Check-in</span></h2>
        <div class="form-group">
            <label for="studentName">学生名字 <span class="en">Student Name</span> <span style="color: red;">*</span></label>
            <input type="text" id="studentName" placeholder="请输入你的名字 / Please enter your name">
        </div>
        <button class="btn btn-checkin" onclick="handleCheckIn()">[签到 Check-in]</button>
    </div>

    <div id="page2" class="page">
        <h2>签到成功 <span class="en">Check-in Successful</span></h2>
        <div class="number-box">
            <p>您的签到号码为 <span class="en">Your check-in number is</span>：</p>
            <div id="numberDisplay" class="number-display">--</div>
        </div>
        <button class="btn btn-confirm" onclick="backToSignIn()">返回首页 <span class="en">Back</span></button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
