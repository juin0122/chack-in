<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到后台管理系统 Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 后台布局与表格样式 */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .admin-table th, .admin-table td { border: 1px solid #cbd5e0; padding: 10px; text-align: center; }
        .admin-table th { background-color: #f8f9fa; color: #2c3e50; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-waiting { background-color: #ffeaa7; color: #d63031; }
        .status-confirmed { background-color: #badc58; color: #6ab04c; }
        .action-btn { padding: 4px 10px; border: none; background-color: #3498db; color: white; border-radius: 4px; cursor: pointer; }
        .action-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .admin-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; }
        
        /* 【新增】二维码展示区域的样式 */
        .qrcode-container {
            text-align: center;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #3498db;
        }
        .qrcode-container img {
            width: 150px;
            height: 150px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container" style="max-width: 600px;">
    <h2>签到后台管理 <span class="en">Admin Dashboard</span></h2>
    
    <div class="qrcode-container">
        <strong>学生扫码签到 <span class="en">Scan to Check-in</span></strong>
        <br>
        <div id="qrcode"></div>
    </div>
    
    <div class="admin-meta">
        <div>
            <strong>当前下个号码 (Next No.):</strong> <span id="adminNextNum">1</span><br>
            <strong>已签到人数 (Total):</strong> <span id="adminTotalCount">0</span> 人
        </div>
        <button class="btn btn-confirm" style="width: auto; padding: 6px 12px; background-color: #e74c3c;" onclick="resetSystem()">[重置系统 Reset All]</button>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>号码 No.</th>
                <th>名字 Name</th>
                <th>状态 Status</th>
                <th>操作 Action</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            <tr><td colspan="4" style="color: #95a5a6;">暂无学生签到 No data available</td></tr>
        </tbody>
    </table>
</div>

<script src="admin.js"></script>
</body>
</html>
